name: Release-plz
on:
  push:
    branches:
      - main
jobs:
  release-plz-release:
    name: Release-plz release
    runs-on: ubuntu-latest
    if: ${{ github.repository_owner == 'emela-lang' }}
    permissions:
      contents: write
    outputs:
      releases_created: ${{ steps.release-plz.outputs.releases_created }}
      tag: ${{ steps.tag.outputs.tag }}
    steps:
      - &checkout
        name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          persist-credentials: true
      - &install-rust
        name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
      - name: Run release-plz
        id: release-plz
        uses: release-plz/action@v0.5
        with:
          command: release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
      # The action exposes `releases` (a JSON array), not a scalar `tag`. Pull the
      # `emela` binary's tag (e.g. `v0.3.0`) out of it for the build/upload jobs.
      - name: Resolve the emela release tag
        id: tag
        if: steps.release-plz.outputs.releases_created == 'true'
        env:
          RELEASES: ${{ steps.release-plz.outputs.releases }}
        run: |
          tag=$(jq -r '.[] | select(.package_name == "emela") | .tag' <<< "$RELEASES")
          echo "tag=$tag" >> "$GITHUB_OUTPUT"

  build:
    name: Build (${{ matrix.target }})
    needs: release-plz-release
    # Gate on the resolved `emela` tag, not `releases_created`: the untagged
    # library crates (git_tag_enable = false) are re-"released" on every run, so
    # `releases_created` is true even when `emela` itself wasn't, leaving `tag`
    # empty. Only build the binary tarball when `emela` cut a new tag.
    if: needs.release-plz-release.outputs.tag != ''
    runs-on: ${{ matrix.os }}
    permissions:
      contents: write
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
          - target: aarch64-apple-darwin
            os: macos-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          ref: ${{ needs.release-plz-release.outputs.tag }}

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build
        run: cargo build --release --target ${{ matrix.target }} --bin emela

      - name: Package tarball
        run: |
          tar czf emela-${{ needs.release-plz-release.outputs.tag }}-${{ matrix.target }}.tar.gz \
            -C target/${{ matrix.target }}/release emela

      - name: Upload asset
        run: gh release upload ${{ needs.release-plz-release.outputs.tag }} ./emela-*.tar.gz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  publish-release:
    name: Publish GitHub Release
    needs: [release-plz-release, build]
    if: needs.release-plz-release.outputs.tag != ''
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Undraft release
        run: gh release edit ${{ needs.release-plz-release.outputs.tag }} --draft=false --repo ${{ github.repository }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  notify-nix:
    name: Notify emela.nix
    # Runs only once the release is public (assets uploaded, undrafted), so the
    # overlay's `nix run .#update` can fetch the tarballs and pin their hashes.
    needs: [release-plz-release, publish-release]
    if: needs.release-plz-release.outputs.tag != ''
    runs-on: ubuntu-latest
    # No GITHUB_TOKEN scopes needed: the cross-repo call uses the App token.
    permissions: {}
    steps:
      - name: "Mint token for emela.nix (GitHub App: emela-release)"
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}
          owner: emela-lang
          repositories: emela.nix

      - name: Dispatch emela-release event
        uses: peter-evans/repository-dispatch@v3
        with:
          token: ${{ steps.app-token.outputs.token }}
          repository: emela-lang/emela.nix
          event-type: emela-release
          client-payload: '{"version": "${{ needs.release-plz-release.outputs.tag }}"}'

  release-plz-pr:
    name: Release-plz PR
    runs-on: ubuntu-latest
    if: ${{ github.repository_owner == 'emela-lang' }}
    permissions:
      pull-requests: write
      contents: write
    concurrency:
      group: release-plz-${{ github.ref }}
      cancel-in-progress: false
    steps:
      - *checkout
      - *install-rust
      - name: Run release-plz
        uses: release-plz/action@v0.5
        with:
          command: release-pr
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
