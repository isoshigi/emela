name: Release

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: release-main
  cancel-in-progress: false

jobs:
  version:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.timestamp.outputs.version }}
      tag: ${{ steps.timestamp.outputs.tag }}
    steps:
      - name: Compute timestamp version
        id: timestamp
        run: |
          version="0.0.$(date -u +%Y%m%d%H%M%S)"
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "tag=v$version" >> "$GITHUB_OUTPUT"

  build:
    needs: version
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            target: aarch64-apple-darwin
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
    runs-on: ${{ matrix.os }}
    env:
      EMELA_VERSION: ${{ needs.version.outputs.version }}
    steps:
      - uses: actions/checkout@v4

      - name: Add Rust target
        run: rustup target add ${{ matrix.target }}

      - name: Test
        run: cargo test --locked

      - name: Build release binary
        run: cargo build --locked --release --bin emela --target ${{ matrix.target }}

      - name: Package binary
        run: |
          package="emela-${{ needs.version.outputs.tag }}-${{ matrix.target }}"
          mkdir -p "dist/$package"
          cp "target/${{ matrix.target }}/release/emela" "dist/$package/emela"
          tar -C dist -czf "dist/$package.tar.gz" "$package"

      - uses: actions/upload-artifact@v4
        with:
          name: emela-${{ matrix.target }}
          path: dist/*.tar.gz
          if-no-files-found: error

  release:
    needs:
      - version
      - build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ needs.version.outputs.tag }}
        run: |
          gh release create "$TAG" dist/*.tar.gz \
            --repo "$GITHUB_REPOSITORY" \
            --target "$GITHUB_SHA" \
            --title "$TAG" \
            --generate-notes \
            --prerelease \
            --latest=false
